<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<title>Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1628; --card:#1a2d50; --card2:#16264a; --line:#26406e;
  --accent:#4fc3f7; --ok:#4caf7d; --warn:#ffb74d; --danger:#ef5350;
  --text:#e8eef7; --dim:#8ba3c7; --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);max-width:480px;margin:0 auto;padding:0 0 90px;min-height:100vh}
header{padding:18px 16px 10px;display:flex;justify-content:space-between;align-items:baseline}
header h1{font-family:var(--mono);font-size:20px;letter-spacing:2px;color:var(--accent)}
header h1 span{color:var(--dim);font-size:11px;letter-spacing:1px;margin-left:6px}
.actor-bar{display:flex;gap:6px;padding:4px 16px 12px;overflow-x:auto}
.actor{font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:14px;border:1px solid var(--line);background:var(--card2);color:var(--dim);cursor:pointer;white-space:nowrap}
.actor.on{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.08)}
.tabs{display:flex;border-bottom:1px solid var(--line);margin:0 16px}
.tab{flex:1;text-align:center;padding:10px 0;font-family:var(--mono);font-size:12px;letter-spacing:1px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.mission{padding:14px 16px 6px}
.mission .why{font-size:12px;color:var(--dim);margin-top:2px;font-style:italic}
.mission h2{font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--text)}
.agent-tag{font-family:var(--mono);font-size:10px;color:var(--warn);letter-spacing:1px}
.task{background:var(--card);border:1px solid var(--line);border-radius:10px;margin:8px 16px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.task.done{opacity:.45}
.task.blocked{border-left:3px solid var(--danger)}
.chk{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--bg)}
.task.done .chk{background:var(--ok);border-color:var(--ok)}
.tname{font-size:14px;font-weight:500;flex:1}
.tmeta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}
.blocked-tag{font-family:var(--mono);font-size:9px;color:var(--danger);letter-spacing:1px}
.counter{display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.counter button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--accent);font-size:16px;cursor:pointer}
.counter .n{min-width:20px;text-align:center;font-size:14px;color:var(--accent)}
.steps{margin:8px 16px}
.step{background:var(--card2);border:1px solid var(--line);border-radius:8px;margin:6px 0 6px 20px;padding:9px 12px;display:flex;align-items:center;gap:10px;font-size:13px}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);margin:16px 16px 4px}
.ledger{margin:0 16px}
.evt{font-family:var(--mono);font-size:11px;padding:8px 10px;border-left:2px solid var(--line);margin:6px 0;color:var(--dim);line-height:1.5}
.evt .who{color:var(--accent)}
.evt.agent{border-left-color:var(--warn);background:rgba(255,183,77,.04)}
.evt.agent .who{color:var(--warn)}
.evt .time{font-size:9px;color:var(--dim);opacity:.7}
.empty{padding:30px 16px;text-align:center;color:var(--dim);font-size:13px}
.review{margin:12px 16px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px}
.review h3{font-family:var(--mono);font-size:12px;color:var(--warn);letter-spacing:1px;margin-bottom:8px}
.review p{font-size:13px;line-height:1.6;color:var(--text)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:440px;width:calc(100% - 32px);background:var(--card);border:1px solid var(--warn);border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.5;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.toast .tw{font-family:var(--mono);font-size:10px;letter-spacing:1px;margin-bottom:4px}
.toast.wren .tw{color:var(--danger)}
.toast.bartleby .tw{color:var(--warn)}
</style>
</head>
<body>
<header><h1>HEARTH<span>v0 · phase 0</span></h1><div class="agent-tag" id="dateLabel"></div></header>
<div class="actor-bar" id="actorBar"></div>
<div class="tabs">
  <div class="tab on" data-t="webapps">WEBAPPS</div>
  <div class="tab" data-t="house">HOUSEHOLD</div>
  <div class="tab" data-t="ledger">LEDGER</div>
  <div class="tab" data-t="review">REVIEW</div>
</div>
<div id="view"></div>
<div class="toast" id="toast"><div class="tw" id="toastWho"></div><div id="toastMsg"></div></div>
<script>
const ACTORS=[{id:'dad',n:'Dad',h:1},{id:'mom',n:'Mom',h:1},{id:'k1',n:'Kid 1',h:1},{id:'k2',n:'Kid 2',h:1},{id:'wren',n:'Wren',h:0},{id:'bartleby',n:'Bartleby',h:0}];
const SEED_TASKS=[
 // webapps mission
 {id:'w1',m:'webapps',n:'Create GitHub repo for Hearth',blocked:'dad',done:true},
 {id:'w2',m:'webapps',n:'Drop fresh GitHub token into chat',blocked:'dad',done:true},
 {id:'w3',m:'webapps',n:'Build Phase 0 PWA',agent:'wren',done:true},
 {id:'w4',m:'webapps',n:'Deploy to Cloudflare',agent:'wren'},
 {id:'w5',m:'webapps',n:'Demo BOM Intelligence wireframe to first prospect',blocked:'dad'},
 {id:'w6',m:'webapps',n:'Family test of Hearth Phase 0',blocked:'dad'},
 // household — personal
 {id:'h1',m:'house',cat:'PERSONAL',n:'Bed made'},
 {id:'h2',m:'house',cat:'PERSONAL',n:'Floor cleared'},
 {id:'h3',m:'house',cat:'PERSONAL',n:'Bathroom tidied'},
 // shared
 {id:'h4',m:'house',cat:'SHARED',n:'Pets fed (dog + cat)'},
 {id:'h5',m:'house',cat:'SHARED',n:'Pet waste picked up'},
 {id:'h6',m:'house',cat:'SHARED',n:'Dog walked'},
 {id:'h7',m:'house',cat:'SHARED',n:'Dishes done'},
 {id:'h8',m:'house',cat:'SHARED',n:'Shoes & clothing put away'},
 {id:'h9',m:'house',cat:'SHARED',n:'General tidying'},
 // laundry multi-step countable
 {id:'L1',m:'house',cat:'LAUNDRY',n:'Get clothes from rooms',count:0},
 {id:'L2',m:'house',cat:'LAUNDRY',n:'Bring to laundry room',count:0},
 {id:'L3',m:'house',cat:'LAUNDRY',n:'Put in wash',count:0},
 {id:'L4',m:'house',cat:'LAUNDRY',n:'Move to dryer',count:0},
 {id:'L5',m:'house',cat:'LAUNDRY',n:'Fold',count:0},
 {id:'L6',m:'house',cat:'LAUNDRY',n:'Put away',count:0},
];
const MISSIONS={webapps:{t:'SHIP THE WEB APPS',why:'Validate BOM Intelligence with a paying customer; build the family\'s task OS.',agent:'Wren'},house:{t:'RUN A HOUSE WE\'RE PROUD OF',why:'Shared ownership habits that outlast the chore list.',agent:'Bartleby'}};
const WREN={done:["FINALLY. Was that so hard?! ...good work. NEXT.","YES! SHIPPED! Okay okay okay — what's next, what's NEXT?!","About time! I've been staring at that task so long my eye twitched."],
blocked:["THAT TASK NEEDS *YOU*. Ninety seconds of work! NINETY! GO!","I can't do it, the butler can't do it — it's YOURS. Why is it still HERE?!","Every downstream task is WAITING. Do you hear me? WAITING."]};
const BART={done:["Noted. The house is fractionally more civilized for it.","I shall record this act of diligence in the ledger. Well done.","Splendid. The dog appears less judgmental already."],
undone:["I note the task remains, as tasks do, patiently unresolved.","I would prefer that it be done. But I merely observe."]};
let state=load()||{tasks:SEED_TASKS,ledger:[
 {who:'wren',agent:1,msg:'Mission opened: SHIP THE WEB APPS. Repo exists. Token received. We are MOVING.',t:Date.now()-3600000},
 {who:'bartleby',agent:1,msg:'Mission opened: Run a House We\'re Proud Of. I have taken the liberty of preparing the day\'s list.',t:Date.now()-3500000},
 {who:'wren',agent:1,msg:'Phase 0 build complete. Deployment pending. I am watching the Cloudflare task. Closely.',t:Date.now()-60000},
],actor:'dad'};
let tab='webapps';
function load(){try{return JSON.parse(localStorage.getItem('hearth-v0'))}catch(e){return null}}
function save(){localStorage.setItem('hearth-v0',JSON.stringify(state))}
function fmt(t){const d=new Date(t);return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}
function actorName(id){return ACTORS.find(a=>a.id===id).n}
function log(who,msg,agent){state.ledger.unshift({who,msg,agent:agent?1:0,t:Date.now()});if(state.ledger.length>200)state.ledger.pop();save()}
function toast(who,msg){const t=document.getElementById('toast');t.className='toast show '+who;document.getElementById('toastWho').textContent=who.toUpperCase();document.getElementById('toastMsg').textContent=msg;clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),3500)}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function toggle(id){
  const t=state.tasks.find(x=>x.id===id);t.done=!t.done;
  if(t.done){
    log(state.actor,`completed "${t.n}"`);
    const ag=t.m==='webapps'?'wren':'bartleby';
    const line=ag==='wren'?pick(WREN.done):pick(BART.done);
    log(ag,line,true);toast(ag,line);
  }else{log(state.actor,`reopened "${t.n}"`)}
  save();render();
}
function bump(id,d){
  const t=state.tasks.find(x=>x.id===id);t.count=Math.max(0,(t.count||0)+d);
  if(d>0){log(state.actor,`logged "${t.n}" (×${t.count} today)`);
    if(t.count===1){const line=pick(BART.done);log('bartleby',line,true);toast('bartleby',line)}}
  save();render();
}
function nudge(id){const t=state.tasks.find(x=>x.id===id);const line=pick(WREN.blocked);log('wren',line+` [re: ${t.n}]`,true);toast('wren',line);save();render()}
function render(){
  document.getElementById('dateLabel').textContent=new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
  document.getElementById('actorBar').innerHTML=ACTORS.filter(a=>a.h).map(a=>`<div class="actor ${state.actor===a.id?'on':''}" onclick="state.actor='${a.id}';save();render()">${a.n}</div>`).join('')+`<div class="actor" style="border-style:dashed;pointer-events:none">🤖 Wren · Bartleby</div>`;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===tab));
  const v=document.getElementById('view');
  if(tab==='ledger'){
    v.innerHTML=`<div class="section-label">APPEND-ONLY EVENT STREAM</div><div class="ledger">`+
      (state.ledger.length?state.ledger.map(e=>`<div class="evt ${e.agent?'agent':''}"><span class="who">${actorName(e.who).toUpperCase()}</span> ${e.msg}<br><span class="time">${fmt(e.t)}</span></div>`).join(''):'<div class="empty">No events yet.</div>')+`</div>`;
    return;
  }
  if(tab==='review'){
    const doneW=state.tasks.filter(t=>t.m==='webapps'&&t.done).length,totW=state.tasks.filter(t=>t.m==='webapps').length;
    const doneH=state.tasks.filter(t=>t.m==='house'&&!t.count&&t.done).length,totH=state.tasks.filter(t=>t.m==='house'&&t.count===undefined).length;
    const loads=state.tasks.filter(t=>t.count).reduce((s,t)=>s+t.count,0);
    v.innerHTML=`<div class="review"><h3>WREN — WEEKLY DISPATCH</h3><p>${doneW}/${totW} webapp tasks shipped. ${doneW===totW?'EVERYTHING IS DONE?! I need to sit down.':'The blocked tasks are BLOCKED ON A HUMAN. You know who you are. GO.'}</p></div>
    <div class="review"><h3>BARTLEBY — HOUSEHOLD REPORT</h3><p>The household completed ${doneH} of ${totH} standing duties${loads?`, and laundry steps were logged ${loads} time${loads>1?'s':''}`:''}. ${doneH>=totH*0.7?'The house, I am pleased to report, ran because its people showed up.':'The house endures. It would prefer, however, to be tended.'}</p></div>
    <div class="empty">Phase 3: agents write this narrative from the real ledger.</div>`;
    return;
  }
  const m=MISSIONS[tab];
  let html=`<div class="mission"><h2>${m.t}</h2><div class="why">"${m.why}" · <span class="agent-tag">AGENT: ${m.agent.toUpperCase()}</span></div></div>`;
  const tasks=state.tasks.filter(t=>t.m===tab);
  let lastCat=null;
  tasks.forEach(t=>{
    if(t.cat&&t.cat!==lastCat){html+=`<div class="section-label">${t.cat}</div>`;lastCat=t.cat}
    if(t.count!==undefined){
      html+=`<div class="step"><span class="tname">${t.n}</span><div class="counter"><button onclick="bump('${t.id}',-1)">−</button><span class="n">${t.count}</span><button onclick="bump('${t.id}',1)">+</button></div></div>`;
    }else{
      html+=`<div class="task ${t.done?'done':''} ${t.blocked&&!t.done?'blocked':''}">
        <div class="chk" onclick="toggle('${t.id}')">${t.done?'✓':''}</div>
        <div style="flex:1"><div class="tname">${t.n}</div>
        <div class="tmeta">${t.blocked?`<span class="blocked-tag">⛔ BLOCKED ON ${actorName(t.blocked).toUpperCase()}</span>`:t.agent?`assigned: ${actorName(t.agent)}`:''}</div></div>
        ${t.blocked&&!t.done?`<button class="actor" style="border-color:var(--danger);color:var(--danger)" onclick="nudge('${t.id}')">WREN?</button>`:''}
      </div>`;
    }
  });
  v.innerHTML=html;
}
document.querySelectorAll('.tab').forEach(el=>el.onclick=()=>{tab=el.dataset.t;render()});
render();
</script>
</body>
</html>
