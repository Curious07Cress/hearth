<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="themeColor" content="#fdfbf7">
<title>Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html{background:#fdfbf7;transition:background .4s}
body.westford{
  --bg:#fdfbf7; --card:#ffffff; --card2:#f8f4ec; --line:#ece4d6;
  --accent:#c06a38; --accent2:#7d9b76; --ok:#5a9e6f; --warn:#e0a83f; --danger:#d95f4b;
  --text:#4a4336; --dim:#9a9080; --head:#c06a38;
}
body.york{
  --bg:#fbfdfd; --card:#ffffff; --card2:#f0f7f5; --line:#dcebe7;
  --accent:#279184; --accent2:#e8b04b; --ok:#4aa87c; --warn:#e8a04b; --danger:#e0705c;
  --text:#3a534e; --dim:#7fa09a; --head:#279184;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;max-width:480px;margin:0 auto;padding:0 0 90px;min-height:100vh;transition:background .4s}
.housestrip{display:flex;gap:8px;padding:14px 16px 2px}
.hbtn{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;padding:10px 0;border-radius:12px;border:1.5px solid var(--line);background:var(--card2);color:var(--dim);cursor:pointer;transition:all .2s}
.hbtn.on{border-color:var(--accent);color:var(--accent);background:var(--card);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.topline{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 0}
.brand{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;opacity:.7}
.topright{display:flex;align-items:center;gap:10px}
.chip{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.picker{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.picker.show{display:flex}
.picker-title{font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:2px;color:var(--text)}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:0 32px;width:100%;max-width:400px}
.pcard{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:22px 0 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.pcard .pavatar{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center}
.pcard .pname{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);font-weight:600}
.sync{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:1px}
.sync .dot{color:var(--ok)}
.sync.err .dot{color:var(--danger)}
.actor-bar{display:flex;gap:6px;padding:8px 16px 10px;overflow-x:auto}
.actor{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 12px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--dim);cursor:pointer;white-space:nowrap}
.actor.on{border-color:var(--accent);color:var(--accent);background:var(--card2);font-weight:600}
.tabs{display:flex;border-bottom:2px solid var(--line);margin:0 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;text-align:center;padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.mission{padding:14px 16px 2px}
.mission h2{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:1px}
.mission .why{font-size:12px;color:var(--dim);margin-top:2px;font-style:italic}
.agent-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent2);letter-spacing:1px;font-weight:600}
.cadence-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent);margin:20px 16px 0;font-weight:600}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);margin:14px 16px 2px}
.task{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:8px 16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.task.done{opacity:.55;box-shadow:none;background:var(--card2);border-color:transparent}
.chk{width:24px;height:24px;min-width:24px;border-radius:8px;border:2px solid var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}
.task.done .chk{background:var(--ok);border-color:var(--ok)}
.tname{font-size:15px;font-weight:600}
.task.done .tname{font-weight:500}
.tmeta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:2px}
.tmeta .attr{color:var(--ok);font-weight:600}
.blocked-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--danger);letter-spacing:1px}
.counter{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;margin-left:auto}
.counter button{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--accent);font-size:17px;cursor:pointer;font-weight:600}
.counter .n{min-width:20px;text-align:center;font-size:14px;color:var(--accent);font-weight:600}
.ledger{margin:0 16px}
.evt{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 10px;border-left:2px solid var(--line);margin:6px 0;color:var(--dim);line-height:1.5;background:var(--card);border-radius:0 10px 10px 0}
.evt .who{color:var(--accent);font-weight:600}
.evt.agent{border-left-color:var(--accent2);background:var(--card2)}
.evt.agent .who{color:var(--accent2)}
.evt .time{font-size:9px;opacity:.7}
.empty{padding:30px 16px;text-align:center;color:var(--dim);font-size:13px;font-style:italic}
.review{margin:12px 16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.review h3{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent2);letter-spacing:1px;margin-bottom:8px}
.review p{font-size:13px;line-height:1.6}
.seg{display:flex;margin:14px 16px 4px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.seg div{flex:1;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;padding:8px 0;color:var(--dim);cursor:pointer;background:var(--card2)}
.seg div.on{color:#fff;background:var(--accent);font-weight:600}
.stepper{display:flex;justify-content:center;align-items:center;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin:8px 0 0}
.stepper button{background:var(--card);border:1px solid var(--line);border-radius:8px;color:var(--accent);width:30px;height:26px;cursor:pointer}
table.board{width:calc(100% - 32px);margin:8px 16px;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12px}
table.board th{text-align:left;color:var(--dim);font-size:10px;letter-spacing:1px;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:500}
table.board td{padding:9px 8px;border-bottom:1px solid var(--card2)}
table.board td.num{text-align:right;color:var(--accent);font-weight:600}
.cov{margin:6px 16px;display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.cov .dots{letter-spacing:3px;font-size:13px}
.cov .dots .y{color:var(--ok)}
.cov .dots .n{color:var(--line)}
.spark{margin:8px 16px 20px}
.task.bounty{border-color:#ecd9a8;background:#fdf6e3}
body.york .task.bounty{background:#fbf7e8}
.task.bounty.done{background:var(--card2);border-color:transparent}
.badge{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#c9962e;background:#fff;border:1.5px solid #ecd9a8;border-radius:10px;padding:4px 9px;white-space:nowrap}
.claimbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#c9962e;background:#fff;border:1.5px solid #c9962e;border-radius:10px;padding:6px 10px;cursor:pointer;font-weight:600}
.gold{color:#c9962e;font-weight:600}
.sechead{display:flex;align-items:center;gap:10px;margin:14px 16px 4px;padding:12px 14px;background:var(--card2);border:1px solid var(--line);border-radius:14px;cursor:pointer}
.sechead .sl{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--accent);font-weight:600;flex:1}
.sechead .sc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);font-weight:600}
.sechead .sc.clear{color:var(--ok)}
.sechead .chev{color:var(--dim);font-size:12px;transition:transform .2s}
.sechead.open .chev{transform:rotate(90deg)}
.sechead.gold{border-color:#ecd9a8}
.sechead.gold .sl{color:#c9962e}
.danger-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#fff;background:var(--danger);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-weight:600}
.admin-form{margin:8px 16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.admin-form input,.admin-form select{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card2);color:var(--text);outline:none}
.admin-form .row{display:flex;gap:8px}
.admin-form .row>*{flex:1}
.admin-form label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:1px;display:flex;align-items:center;gap:6px}
.payout{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:#fff;background:#c9962e;border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:440px;width:calc(100% - 32px);background:var(--card);border:1px solid var(--accent2);border-left:4px solid var(--accent2);border-radius:14px;padding:12px 16px;font-size:13px;line-height:1.5;z-index:99;box-shadow:0 6px 24px rgba(0,0,0,.12);opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.toast .tw{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;margin-bottom:4px;color:var(--accent2);font-weight:600}
.bartbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:150;cursor:pointer;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.bb-status{flex:1;font-size:12px;font-style:italic;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bb-mic{width:38px;height:38px;min-width:38px;border-radius:50%;border:none;background:var(--accent2);color:#fff;font-size:16px;cursor:pointer}
.hearth-greet{margin:14px 16px 6px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.hearth-greet .hg-line{font-size:16px;line-height:1.55;font-style:italic}
.hearth-greet .hg-health{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;color:var(--dim);margin-top:10px}
.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 16px}
.qchip{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--accent);cursor:pointer;white-space:nowrap}
.hearth-chat .chatlog{min-height:34vh;max-height:44vh;padding:10px 0}
.hearth-chat .converse-inputrow{border-top:none;padding:8px 0 calc(14px + env(safe-area-inset-bottom))}
.hearth-chat{margin:0 16px}
.listenbar{display:none;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--danger);border-radius:14px;padding:10px 14px;margin:4px 0}
.listenbar.show{display:flex}
.listenbar .lb-mode{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--danger);font-weight:600;flex:1}
.lvl{display:flex;gap:3px;align-items:center;height:22px}
.lvl span{width:4px;height:4px;border-radius:2px;background:var(--danger);transition:height .08s}
.chatlog{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;min-height:180px}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.bubble.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bubble.bart{align-self:flex-start;background:var(--card2);color:var(--text);border-bottom-left-radius:4px;font-style:italic}
.bubble.err{align-self:center;background:#fde;color:var(--danger);font-style:normal;font-size:12px}
.typing{align-self:flex-start;display:flex;gap:4px;padding:10px 14px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:tb 1s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,60%,100%{opacity:.3}30%{opacity:1}}
.proposal{align-self:stretch;background:var(--card);border:1.5px solid var(--accent2);border-radius:14px;padding:12px 14px;font-size:13px}
.proposal .pl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--accent2);margin-bottom:6px;font-weight:600}
.proposal ul{margin:4px 0 10px 18px}
.proposal .prow{display:flex;gap:8px;margin-top:6px}
.proposal .prow button{flex:1;padding:9px 0;border-radius:10px;border:none;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;font-weight:600;cursor:pointer}
.proposal .pconfirm{background:var(--ok);color:#fff}
.proposal .pcancel{background:var(--card2);color:var(--dim);border:1px solid var(--line) !important}
.converse-inputrow{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line);align-items:center}
.converse-inputrow input{flex:1;font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:11px 14px;border-radius:14px;border:1px solid var(--line);background:var(--card2);color:var(--text);outline:none}
.mic{width:42px;height:42px;min-width:42px;border-radius:50%;border:none;background:var(--card2);color:var(--accent2);font-size:18px;cursor:pointer}
.mic.rec{background:var(--danger);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,95,75,.4)}50%{box-shadow:0 0 0 8px rgba(217,95,75,0)}}
.sendbtn{width:42px;height:42px;min-width:42px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:16px;cursor:pointer}
</style>
</head>
<body class="westford">
<div class="topline"><div class="brand">hearth</div><div class="topright"><div class="chip" id="meChip" onclick="openPicker()"></div><div class="sync" id="sync"><span class="dot">●</span></div></div></div>
<div class="housestrip" id="housestrip"></div>
<div class="picker" id="picker"><div class="picker-title">Who's home?</div><div class="picker-grid" id="pickerGrid"></div></div>
<div class="tabs" id="tabBar"></div>
<div id="view"></div>
<div class="toast" id="toast"><div class="tw" id="toastWho"></div><div id="toastMsg"></div></div>
<div class="bartbar" id="bartbar" style="display:none" onclick="goHearth(false)">
  <span class="bb-status" id="bbStatus">The house is waking…</span>
  <button class="bb-mic" onclick="event.stopPropagation();goHearth(true)">🎤</button>
</div>
<script>
const SB='https://wxifknodqieeuegsglnq.supabase.co/rest/v1';
const KEY='sb_publishable_y2CtDezvstqPQfVqW2ORHw_mY1FoLNs';
const HDRS={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
const ACTORS=[{id:'dad',n:'Eric',h:1,adult:1},{id:'mom',n:'Charlene',h:1,adult:1},{id:'k1',n:'Sofia',h:1},{id:'k2',n:'Emma',h:1},{id:'wren',n:'Wren'},{id:'bartleby',n:'Bartleby'}];
const MISSIONS={webapps:{t:'SHIP THE WEB APPS',why:'Validate BOM Intelligence with a paying customer; build the family\'s task OS.',agent:'Wren'},house:{t:'RUN A HOUSE WE\'RE PROUD OF',why:'Shared ownership habits that outlast the chore list.',agent:'Bartleby'}};
const HOUSES={westford:{label:'🏠 WESTFORD',bg:'#fdfbf7'},york:{label:'🌊 YORK',bg:'#fbfdfd'}};
const CAD_ORDER=['daily','weekly','monthly','quarterly','once'];
const CAT_EMOJI={'PETS':'🐾','KITCHEN':'🍽️','PERSONAL':'🛏️','COMMON':'🏠','LAUNDRY':'🧺','BATHROOMS':'🚿','HOUSE':'🧹','POOL & HOT TUB':'💧','CARS':'🚗','MAINTENANCE':'🔧','EXTRAS':'💰'};
function catLabel(cat){const disp=cat==='PERSONAL'?'PERSONAL DAILIES':cat;return (CAT_EMOJI[cat]?CAT_EMOJI[cat]+' ':'')+disp}
const WREN={done:["FINALLY. Was that so hard?! ...good work. NEXT.","YES! SHIPPED! Okay okay okay — what's next, what's NEXT?!","About time! I've been staring at that task so long my eye twitched."],
blocked:["THAT TASK NEEDS *YOU*. Ninety seconds of work! NINETY! GO!","I can't do it, the butler can't do it — it's YOURS. Why is it still HERE?!","Every downstream task is WAITING. Do you hear me? WAITING."]};
const BART={done:["Noted. The house is fractionally more civilized for it.","I shall record this act of diligence in the ledger. Well done.","Splendid. Cooper appears less judgmental already.","Roxy has observed your effort and remains unimpressed. I, however, approve."]};
let tasks=[],events=[],actor=localStorage.getItem('hearth-actor')||null;
let house=localStorage.getItem('hearth-house')||'westford';
let tab='hearth',period='WEEK',dayOffset=0,syncOK=true;
let secOverrides=JSON.parse(localStorage.getItem('hearth-collapse')||'{}');
function toggleSec(k){const cur=secOpen(k);secOverrides[k]=!cur;localStorage.setItem('hearth-collapse',JSON.stringify(secOverrides));render()}
let secDefaults={};
function secOpen(k){return k in secOverrides?secOverrides[k]:(secDefaults[k]||false)}
const INITIALS={dad:'E',mom:'C',k1:'S',k2:'Em'};
const yorkSeason=()=>{const m=new Date().getMonth()+1;return m>=5&&m<=10};
if(house==='york'&&!yorkSeason())house='westford';
function el(id){return document.getElementById(id)}
function fmt(t){const d=new Date(t);return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}
function tmOnly(t){return new Date(t).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}
function dOnly(t){return new Date(t).toLocaleDateString(undefined,{month:'short',day:'numeric'})}
function actorName(id){const a=ACTORS.find(a=>a.id===id);return a?a.n:id}
function isAdult(id){const a=ACTORS.find(a=>a.id===id);return a&&a.adult}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function dayKey(t){const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function toast(who,msg){const t=el('toast');t.classList.add('show');el('toastWho').textContent=who.toUpperCase();el('toastMsg').textContent=msg;clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),3500)}
function setSync(ok){syncOK=ok;el('sync').className='sync'+(ok?'':' err');el('sync').innerHTML='<span class="dot">●</span> '+(ok?'SYNCED':'OFFLINE')}
function paint(){const bg=HOUSES[house].bg;
  document.body.className=house;
  const p=()=>{document.documentElement.style.setProperty('background',bg,'important');document.body.style.setProperty('background',bg,'important')};
  p();requestAnimationFrame(p);el('themeColor').setAttribute('content',bg);}
async function fetchAll(){
  try{
    const[tr,er]=await Promise.all([
      fetch(SB+'/tasks?select=*&order=sort',{headers:HDRS}),
      fetch(SB+'/events?select=*&order=created_at.desc&limit=1000',{headers:HDRS})
    ]);
    if(!tr.ok||!er.ok)throw 0;
    tasks=await tr.json();events=await er.json();
    events.forEach(e=>e.t=new Date(e.created_at).getTime());
    setSync(true);
  }catch(e){setSync(false)}
  render();
}
async function post(ev){
  const arr=Array.isArray(ev)?ev:[ev];
  const keys=[...new Set(arr.flatMap(o=>Object.keys(o)))];
  const norm=arr.map(o=>{const n={};keys.forEach(k=>n[k]=k in o?o[k]:null);return n});
  try{const r=await fetch(SB+'/events',{method:'POST',headers:HDRS,body:JSON.stringify(norm)});
    if(!r.ok){const body=await r.text();throw new Error('HTTP '+r.status+': '+body.slice(0,200))}

// ---- cadence windows ----
function windowStart(cad){
  const d=new Date();d.setHours(0,0,0,0);
  if(cad==='daily')return d.getTime();
  if(cad==='weekly'){const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return d.getTime()}
  if(cad==='monthly'){d.setDate(1);return d.getTime()}
  if(cad==='quarterly'){d.setMonth(Math.floor(d.getMonth()/3)*3,1);return d.getTime()}
  return 0; // once
}
function doneState(t,forActor){
  const ws=windowStart(t.cadence||'daily');
  let ev=events.filter(e=>e.task_id===t.id&&(e.type==='complete'||e.type==='reopen')&&e.t>=ws);
  if(t.category==='PERSONAL')ev=ev.filter(e=>e.actor===(forActor||actor));
  if(!ev.length)return null;
  return ev[0].type==='complete'?ev[0]:null;
}
function bountyState(t){
  const ws=windowStart(t.cadence||'once');
  const ev=events.filter(e=>e.task_id===t.id&&e.t>=ws);
  const paid=ev.find(e=>e.type==='payout');
  const done=ev.find(e=>e.type==='complete');
  const claim=ev.find(e=>e.type==='claim');
  const req=ev.find(e=>e.type==='claim_request');
  if(paid)return{s:'paid',by:done?done.actor:(paid.target||paid.actor),t:paid.t};
  if(done)return{s:'done',by:done.actor,t:done.t};
  if(t.assigned_to)return{s:'claimed',by:t.assigned_to,standing:true};
  if(claim)return{s:'claimed',by:claim.target||claim.actor,t:claim.t};
  if(req)return{s:'requested',by:req.actor,t:req.t};
  return{s:'open'};
}

function periodRange(){
  const now=new Date();
  if(period==='DAY'){const d=new Date(now);d.setDate(d.getDate()+dayOffset);const s=new Date(d);s.setHours(0,0,0,0);const e=new Date(d);e.setHours(23,59,59,999);return[s.getTime(),e.getTime(),d]}
  if(period==='WEEK'){const s=new Date(now);s.setDate(s.getDate()-6);s.setHours(0,0,0,0);return[s.getTime(),now.getTime()]}
  if(period==='MONTH'){const s=new Date(now);s.setDate(s.getDate()-29);s.setHours(0,0,0,0);return[s.getTime(),now.getTime()]}
  const s=new Date(now);s.setFullYear(s.getFullYear()-1);s.setHours(0,0,0,0);return[s.getTime(),now.getTime()];

function houseEvents(from,to){const bids=BOUNTY_IDS();return events.filter(e=>e.type!=='agent_msg'&&e.type!=='claim'&&e.type!=='payout'&&e.type!=='claim_request'&&e.type!=='allowance'&&e.type!=='admin'&&e.type!=='note'&&!CONVO_TYPES.includes(e.type)&&e.mission==='house'&&!bids.has(e.task_id)&&e.t>=from&&e.t<=to)}

  const ev=houseEvents(from,to).filter(e=>e.actor===aid);
  const comp=ev.filter(e=>e.type==='complete').length-ev.filter(e=>e.type==='reopen').length;
  const cnt=ev.filter(e=>e.type==='count').reduce((s,e)=>s+(e.qty||1),0);

function streak(aid){

      const now=Date.now();
      if(rms>0.02){spoke=true;lastVoice=now}
      if(!recMeta.holdMode&&((spoke&&now-lastVoice>cfg.silenceMs)||(now-t0>cfg.maxMs))){stopRec(!spoke&&recMeta.confirm);return}
      vad.raf=requestAnimationFrame(tick);
    };
    vad.raf=requestAnimationFrame(tick);
  }catch(e){/* VAD unavailable — manual stop still works */}
}
function stopVAD(){if(vad.raf)cancelAnimationFrame(vad.raf);vad.raf=null;vad.analyser=null}
function setMicHint(t){const i=el('converseInput');if(i)i.placeholder=t||'Tell Bartleby…'}
function showListenBar(mode){const b=el('listenbar');if(!b)return;b.classList.add('show');el('lbMode').textContent=mode}
function hideListenBar(){const b=el('listenbar');if(b)b.classList.remove('show')}
function drawLevel(rms){const m=el('lvlMeter');if(!m)return;const bars=m.children;const v=Math.min(1,rms*12);
  for(let i=0;i<bars.length;i++){const f=Math.max(.15,v*(0.55+0.45*Math.sin(Date.now()/90+i*1.1)));bars[i].style.height=(4+f*18)+'px'}}
// Pointer handling: quick tap = tap-mode (auto-stop); press-and-hold = walkie-talkie (release sends)
let micPressT=0,micHoldTimer=null;
function micDown(ev){
  ev.preventDefault();
  if(mediaRecorder&&mediaRecorder.state==='recording'&&!recMeta.holdMode){stopRec();micPressT=0;return}
  micPressT=Date.now();
  startRec({hold:false});
  micHoldTimer=setTimeout(()=>{recMeta.holdMode=true;showListenBar('RELEASE TO SEND')},350);
}
function micUp(ev){
  ev.preventDefault();
  clearTimeout(micHoldTimer);
  if(!micPressT)return;
  const held=Date.now()-micPressT;micPressT=0;
  if(held>=350){stopRec()} // walkie-talkie release
  // quick tap: leave recording running; VAD or second tap ends it
}
async function toggleRec(){ // kept for chips/deep-link: tap-mode start
  if(mediaRecorder&&mediaRecorder.state==='recording'){stopRec();return}
  startRec({hold:false});
}
function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(blob)})}
async function runConverse(payload){
  showTyping();
  try{
    const r=await fetch('/api/converse',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({actor,house,history:convoHistory,...payload})});
    const data=await r.json();
    hideTyping();
    if(!r.ok||data.error){appendBubble('err','Bartleby is at a loss: '+(data.error||'unknown error'));return}
    convoHistory.push({role:'user',text:data.transcript||payload.text||''});
    convoHistory.push({role:'assistant',text:data.reply});
    if(convoHistory.length>20)convoHistory=convoHistory.slice(-20);
    appendBubble('bart',data.reply);
    speak(data.reply);
    if(data.proposal)renderProposal(data.proposal);
  }catch(e){hideTyping();appendBubble('err','Could not reach the house. Check your connection.')}
}
let lastPropBox=null;
function renderProposal(p){
  pendingProposal=p;
  const log=el('chatlog');
  const box=document.createElement('div');box.className='proposal';lastPropBox=box;
  if(p.kind==='events'){
    box.innerHTML=`<div class="pl">PROPOSED LEDGER ENTRIES</div><ul>${p.events.map(e=>`<li>${e.new_task?'➕ new task: "'+e.new_task.name+'" ('+e.new_task.cadence+') — ':''}${e.msg}${e.qty?' ×'+e.qty:''}</li>`).join('')}</ul>
      <div class="prow"><button class="pcancel" onclick="rejectProposal(this)">DISCARD</button><button class="pconfirm" onclick="confirmProposal(this)">CONFIRM</button></div>`;
  }else if(p.kind==='suggestion'){
    box.innerHTML=`<div class="pl">SUGGESTION FOR DAD'S REVIEW</div><ul><li>${p.suggestion}</li></ul>
      <div class="prow"><button class="pcancel" onclick="rejectProposal(this)">DISCARD</button><button class="pconfirm" onclick="confirmProposal(this)">SUBMIT</button></div>`;
  }else if(p.kind==='bounty'){
    const b=p.bounty;
    box.innerHTML=`<div class="pl">PROPOSED BOUNTY</div><ul><li>"${b.name}" — $${b.amount}${b.assigned_to?' · '+actorName(b.assigned_to):' · open'}${b.requires_training?' · needs approval':''}</li></ul>
      <div class="prow"><button class="pcancel" onclick="rejectProposal(this)">DISCARD</button><button class="pconfirm" onclick="confirmProposal(this)">POST IT</button></div>`;
  }
  const hint=document.createElement('div');
  hint.style.cssText='font-size:10px;color:var(--dim);font-family:IBM Plex Mono,monospace;letter-spacing:.5px;margin-top:7px;text-align:center';
  hint.textContent='SAY "YES" OR "NO" — OR TAP';
  box.appendChild(hint);
  log.appendChild(box);log.scrollTop=log.scrollHeight;
  sfx('proposal');
  if(micStream&&micStream.active)setTimeout(()=>{if(pendingProposal)startRec({confirm:true})},400);
}
async function handleSpokenConfirm(b64,mime){
  if(!pendingProposal||!lastPropBox)return;
  try{
    const r=await fetch('/api/transcribe',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({audioBase64:b64,audioMime:mime})});
    if(!r.ok)return;
    const d=await r.json();
    const t=(d.text||'').toLowerCase();
    if(/\b(yes|yeah|yep|yup|confirm|confirmed|do it|post it|sure|correct)\b/.test(t)){
      const btn=lastPropBox.querySelector('.pconfirm');if(btn&&!btn.disabled)confirmProposal(btn);
    }else if(/\b(no|nope|discard|cancel|never mind|reject|wrong)\b/.test(t)){
      const btn=lastPropBox.querySelector('.pcancel');if(btn&&!btn.disabled)rejectProposal(btn);
    }
    // anything else: leave the card for a tap
  }catch(e){}
}
async function confirmProposal(btn){
  const p=pendingProposal;if(!p)return;
  sfx('confirm');
  btn.closest('.proposal').querySelectorAll('button').forEach(b=>b.disabled=true);
  if(p.kind==='events'){
    // Create any proposed new tasks first, so events can reference them
    for(const e of p.events){
      if(e.new_task&&!e.task_id){
        const nt=e.new_task;
        const id='task-'+nt.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30)+'-'+Date.now()%10000;
        const row={id,mission:'house',name:nt.name,category:nt.category||'HOUSE',
          shared:nt.shared!==false,countable:!!nt.countable,house:house,
          cadence:nt.cadence||'once',audience:'all',sort:200};
        try{
          const r=await fetch(SB+'/tasks',{method:'POST',headers:HDRS,body:JSON.stringify(row)});
          if(!r.ok)throw new Error(await r.text());
          e.task_id=id;
        }catch(err){appendBubble('err','Could not create task "'+nt.name+'" — '+String(err.message).slice(0,150))}
      }
    }
    const evs=p.events.map(e=>{
      const t=e.task_id?tasks.find(x=>x.id===e.task_id):null;
      return{actor,task_id:e.task_id||null,type:e.type,qty:e.qty||null,mission:t?t.mission:'house',msg:e.msg};
    });
    evs.push({actor,type:'confirmation',mission:'house',msg:'confirmed via Tell Bartleby: '+p.summary});
    await post(evs);
    appendBubble('bart','Recorded. Thank you.');
    speak('Recorded. Thank you.');
    convoHistory.push({role:'user',text:'(confirmed the proposal)'},{role:'assistant',text:'Recorded. Thank you.'});
  }else if(p.kind==='suggestion'){
    box.innerHTML=`<div class="pl">SUGGESTION FOR DAD'S REVIEW</div><ul><li>${p.suggestion}</li></ul>
      <div class="prow"><button class="pcancel" onclick="rejectProposal(this)">DISCARD</button><button class="pconfirm" onclick="confirmProposal(this)">SUBMIT</button></div>`;
  }else if(p.kind==='bounty'){
    const b=p.bounty;
    const nb={id:'bounty-'+b.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30)+'-'+Date.now()%10000,
      mission:'house',name:b.name,category:'EXTRAS',shared:false,countable:false,
      house:b.house||'both',cadence:b.cadence||'once',audience:'all',sort:250,
      bounty:b.amount,assigned_to:b.assigned_to||null,requires_training:!!b.requires_training};
    try{
      const r=await fetch(SB+'/tasks',{method:'POST',headers:HDRS,body:JSON.stringify(nb)});
      if(!r.ok)throw new Error(await r.text());
      await post([{actor,type:'admin',mission:'house',msg:`admin: posted bounty "${b.name}" ($${b.amount}) via Tell Bartleby`},
                  {actor,type:'confirmation',mission:'house',msg:'confirmed via Tell Bartleby: '+p.summary}]);
      appendBubble('bart','Posted. I shall inform the household.');
    }catch(e){appendBubble('err','Posting failed — '+e.message)}
  }
  else if(p.kind==='suggestion'){
    const id='suggest-'+Date.now();
    const row={id,mission:'house',name:`Review: ${p.suggestion} (from ${actorName(actor)})`,category:'SUGGESTIONS',
      shared:false,countable:false,house:'both',cadence:'once',audience:'adult',sort:290};
    try{
      const r=await fetch(SB+'/tasks',{method:'POST',headers:HDRS,body:JSON.stringify(row)});
      if(!r.ok)throw new Error(await r.text());
      await post([{actor,type:'note',mission:'house',msg:`suggestion from ${actorName(actor)}: ${p.suggestion}`},
                  {actor,type:'confirmation',mission:'house',msg:'confirmed via Tell Bartleby: '+p.summary}]);
      appendBubble('bart','Noted and filed. The house will see it reaches the master of the house.');
      speak('Noted and filed. The house will see it reaches the master of the house.');
    }catch(e){appendBubble('err','Filing failed — '+String(e.message).slice(0,150))}
  }
  pendingProposal=null;
}
async function rejectProposal(btn){
  sfx('discard');
  btn.closest('.proposal').querySelectorAll('button').forEach(b=>b.disabled=true);
  await post({actor,type:'rejection',mission:'house',msg:'discarded proposal: '+(pendingProposal?pendingProposal.summary:'')});
  appendBubble('bart','Discarded. As you wish.');
  convoHistory.push({role:'user',text:'(discarded the proposal)'},{role:'assistant',text:'Discarded. As you wish.'});
  pendingProposal=null;
}
paint();
if(new URLSearchParams(location.search).get('listen')==='1'){
  history.replaceState(null,'',location.pathname);
  if(actor){tab='hearth';setTimeout(()=>{render();startRec({hold:false}).catch(()=>{})},300)}
}
fetchAll();
setInterval(fetchAll,30000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)fetchAll()});
</script>
